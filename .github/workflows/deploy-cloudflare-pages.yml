name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

env:
  VITE_API_BASE: https://xoxiang-hub.xingke0.workers.dev
  VITE_APP_VERSION: ${{ github.sha }}
  VITE_COMMIT_SHA: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WEB_AUTH_TOKEN: ${{ secrets.WEB_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Please add it in repo Settings > Secrets."
            exit 1
          fi
          if [ -z "$WEB_AUTH_TOKEN" ]; then
            echo "::warning::WEB_AUTH_TOKEN secret is not set; web UI will fail to authenticate against the public hub."
          fi

      - name: Build web UI
        run: pnpm --filter @mini-slock/web build
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}
          VITE_WEB_AUTH_TOKEN: ${{ secrets.WEB_AUTH_TOKEN }}
          VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}
          VITE_COMMIT_SHA: ${{ env.VITE_COMMIT_SHA }}

      - name: Deploy to Cloudflare Pages
        id: pages_deploy
        run: |
          set +e
          pnpm --filter @mini-slock/cloudflare exec wrangler pages deploy "$GITHUB_WORKSPACE/packages/web/dist" \
            --project-name xoxiang-web \
            --branch main \
            --commit-dirty=true 2>&1 | tee /tmp/wrangler-pages-deploy.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error::wrangler pages deploy failed with exit code $status"
            exit "$status"
          fi
          url=$(grep -oE 'https://[^ ]+\.pages\.dev[^ ]*' /tmp/wrangler-pages-deploy.log | tail -1)
          if [ -n "$url" ]; then
            echo "pages_url=$url" >> "$GITHUB_OUTPUT"
            echo "::notice::Pages deployed: $url"
          fi
          exit "$status"

      - name: Report Pages URL
        if: steps.pages_deploy.outputs.pages_url != ''
        run: echo "Deployed to ${{ steps.pages_deploy.outputs.pages_url }}"
