name: Deploy Cloudflare Hub

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DAEMON_API_KEY: ${{ secrets.DAEMON_API_KEY }}
      XOXIANG_VERSION: ${{ github.sha }}
      XOXIANG_COMMIT_SHA: ${{ github.sha }}
      XOXIANG_BUILD_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (typecheck + test)
        run: pnpm verify

      - name: Check required secrets
        run: |
          if [ -z "$DAEMON_API_KEY" ]; then
            echo "::error::DAEMON_API_KEY secret is not set. Please add it in repo Settings > Secrets."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set."
            exit 1
          fi

      - name: Upload DAEMON_API_KEY to Cloudflare Worker
        run: printf '%s' "$DAEMON_API_KEY" | pnpm --filter @mini-slock/cloudflare exec wrangler secret put DAEMON_API_KEY

      - name: Deploy Cloudflare Worker
        run: pnpm --filter @mini-slock/cloudflare run deploy
