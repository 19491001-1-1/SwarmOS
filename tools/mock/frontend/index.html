<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mock Event Viewer</title>
    <style>body{font-family:Helvetica;background:#f5f5f5}#log{white-space:pre-wrap;font-family:monospace;background:#fff;padding:12px;border-radius:6px;max-height:80vh;overflow:auto}</style>
  </head>
  <body>
    <h3>Mock Event Viewer</h3>
    <div id="status">Disconnected</div>
    <div id="log"></div>
    <script>
      const status = document.getElementById('status');
      const log = document.getElementById('log');
      const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + (location.hostname || 'localhost') + ':4001/ws');
      ws.onopen = () => { status.textContent = 'Connected'; log.textContent += 'Connected\n'; };
      ws.onmessage = (m) => { log.textContent += m.data + '\n\n'; };
      ws.onclose = () => { status.textContent = 'Closed'; log.textContent += 'Closed\n'; };
      ws.onerror = (e) => { log.textContent += 'Error: ' + e + '\n'; };
    </script>
  </body>
</html>
